name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v3

      # Install Node.js (VERY IMPORTANT 🔥)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install dependencies
      - name: Install dependencies
        run: |
          cd medconnect_frontend
          npm install

      # Build frontend
      - name: Build project
        run: |
          cd medconnect_frontend
          npm run build

      # Deploy to Azure
      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_PEBBLE_0EDF3A500 }}
          action: "upload"
          app_location: "medconnect_frontend"
          api_location: ""
          output_location: "dist"
